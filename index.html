<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【台酒便利店-花蓮店】即期惜福品</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen pb-20">

    <div class="bg-blue-900 text-white p-6 text-center shadow-lg">
        <h1 class="text-xl font-bold">🛒 台酒便利店-花蓮店</h1>
        <p class="text-sm opacity-80 mt-1">即期惜福商品 新增品項</p>
    </div>

    <div class="max-w-md mx-auto mt-4 px-4">
        <div class="bg-white border border-gray-200 p-4 rounded-xl shadow-sm text-sm text-gray-700 space-y-2">
            <p>⚠️ 此網頁僅供布達 此批新增的即期惜福商品 使用</p>
            <p>⚠️ 非即時庫存資訊，數量有限，售完為止</p>
            <p>⚠️ 實際庫存以門市現場餘量為主</p>
            <p class="font-bold text-blue-600">更新日期時間: <span id="update-time">讀取中...</span></p>
        </div>
    </div>

    <div class="max-w-md mx-auto mt-2 px-4 text-center">
        <p class="text-[12px] text-gray-500 italic">⚠️ 飲酒過量，有礙健康。酒後不開車，安全有保障。未滿十八歲禁止飲酒。</p>
    </div>

    <div id="product-list" class="max-w-md mx-auto mt-4 px-4 space-y-4">
        <p class="text-center text-gray-500 py-10">資料讀取中...</p>
    </div>

    <div class="fixed bottom-0 left-0 w-full p-4 bg-white border-t border-gray-200 shadow-2xl z-50">
        <a href="https://line.me/ti/g2/_jxT5l1rkZsZABIYSWUFhankLj3kauPqgieoVw?utm_source=invitation&utm_medium=link_copy&utm_campaign=default" 
           class="block w-full bg-green-500 text-white text-center py-3 rounded-lg font-bold shadow-md hover:bg-green-600 transition">
            💬 點擊諮詢/保留商品
        </a>
    </div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQnV4EqBRopVryeZFVCCVelHDLrhthjiKbJ5EC88d0HjuZ5ub22wrbgPc6ELc0rrLUvkj3o5uqxNAC4/pub?output=csv'; 

    fetch(csvUrl)
        .then(res => res.text())
        .then(data => {
            const lines = data.split(/\r?\n/).filter(l => l.trim() !== '');
            document.getElementById('update-time').innerText = lines[0].split(',')[0].trim();

            const container = document.getElementById('product-list');
            container.innerHTML = '';

            for (let i = 2; i < lines.length; i++) {
                // 核心修正：使用正則表達式來分割，忽略價格內部的逗號
                // 意思：只在「逗號後面跟著空格」或「這是一個新欄位」時才切分
                const row = lines[i];
                // 這個正則表達式會比較精準地抓出四個欄位
                const cols = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || row.split(',');
                
                // 確保我們抓到了名稱(索引0)和惜福價(索引2)
                if (cols.length >= 3) {
                    const name = cols[0].replace(/"/g, '');
                    const originalPrice = cols[1] ? cols[1].replace(/"/g, '') : "0";
                    const salePrice = cols[2] ? cols[2].replace(/"/g, '') : "0";
                    const date = cols[3] ? cols[3].replace(/"/g, '') : "無期限";
                    
                    container.innerHTML += `
                        <div class="bg-white rounded-xl shadow-sm p-4 border border-gray-100 flex justify-between items-center">
                            <div>
                                <h2 class="font-bold text-gray-800">${name}</h2>
                                <p class="text-xs text-gray-400 mt-1">⏳ 有效期限: ${date}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-xs text-gray-400 line-through">原價 $${originalPrice}元</p>
                                <p class="text-xl font-black text-red-600">$${salePrice}元</p>
                            </div>
                        </div>
                    `;
                }
            }
        });
</script>
</body>
</html>
