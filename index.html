<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【台酒便利店-花蓮店】即期惜福品</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen pb-10">

    <div class="bg-blue-900 text-white p-6 text-center shadow-lg">
        <h1 class="text-xl font-bold">🛒 台酒便利店-花蓮店</h1>
        <p class="text-sm opacity-80 mt-1">即期惜福商品清單</p>
    </div>

    <div class="max-w-md mx-auto mt-4 px-4">
        <div class="bg-red-50 border-l-4 border-red-500 p-3 text-red-700 text-sm font-bold shadow-sm">
            ⚠️ 數量有限，售完為止，實際以門市現場餘量為主
        </div>
    </div>

    <div id="product-list" class="max-w-md mx-auto mt-4 px-4 space-y-4">
        <p class="text-center text-gray-500">讀取中...</p>
    </div>

    <script>
        // 請確保 Google Sheet 的欄位順序：名稱, 原價, 惜福價, 有效期限
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQnV4EqBRopVryeZFVCCVelHDLrhthjiKbJ5EC88d0HjuZ5ub22wrbgPc6ELc0rrLUvkj3o5uqxNAC4/pub?output=csv'; 

        fetch(csvUrl)
            .then(res => res.text())
            .then(data => {
                const container = document.getElementById('product-list');
                container.innerHTML = '';
                const lines = data.split('\n').filter(l => l.trim() !== '');
                
                for (let i = 1; i < lines.length; i++) {
                    const [name, originalPrice, salePrice, date] = lines[i].split(',').map(item => item.trim());
                    
                    container.innerHTML += `
                        <div class="bg-white rounded-xl shadow-md p-4 border border-gray-100 flex justify-between items-center transition hover:shadow-lg">
                            <div>
                                <h2 class="font-bold text-gray-800">${name}</h2>
                                <p class="text-xs text-gray-400 mt-1">⏳ 到期: ${date}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-xs text-gray-400 line-through">原價 $${originalPrice}</p>
                                <p class="text-xl font-black text-red-600">$${salePrice}</p>
                            </div>
                        </div>
                    `;
                }
            });
    </script>
</body>
</html>
