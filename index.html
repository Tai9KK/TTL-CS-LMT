<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 強制禁止瀏覽器快取，確保永遠讀取最新版 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>TTL 便利店 - 專案儀表板</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-6">

    <div class="max-w-xl mx-auto">
        <h1 class="text-3xl font-bold text-blue-900 mb-8 text-center">🏢 便利店專案儀表板</h1>
        
        <div id="site-list" class="grid gap-4">
            <!-- 列表將由下方 JavaScript 自動產生 -->
        </div>
    </div>

    <script>
        // 在這裡維護您的據點
        const sites = [
            { name: "花蓮便利店-新增即期品", file: "LMT-HL.html", color: "bg-blue-600" },
            { name: "台東便利店-新增即期品", file: "LMT-TD.html", color: "bg-orange-600" }
        ];

        const listContainer = document.getElementById('site-list');
        
        sites.forEach(site => {
            listContainer.innerHTML += `
                <a href="${site.file}" class="${site.color} text-white p-6 rounded-2xl shadow-lg hover:opacity-90 transition flex justify-between items-center transform hover:scale-[1.02]">
                    <span class="text-xl font-bold">${site.name}</span>
                    <span class="bg-white/20 px-4 py-2 rounded-lg font-bold">進入查看 →</span>
                </a>
            `;
        });
    </script>
</body>
</html>
