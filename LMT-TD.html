<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【台酒便利店-台東店】即期惜福品</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen pb-24 text-lg">

    <!-- 跳出視窗 -->
    <div id="info-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-[100] px-4">
        <div class="bg-white rounded-2xl p-6 max-w-sm w-full shadow-2xl">
            <h2 class="text-xl font-bold text-blue-900 mb-4 text-center">🔔 重要說明</h2>
            <div class="space-y-4 text-gray-700 text-base">
                <p>⚠️ 此網頁目前僅供內部使用</p>
                <p>⚠️ 布達此批新增的即期惜福商品</p>
                <p>⚠️ <strong  class="font-black text-red-600">非即時庫存資訊</strong>，數量有限，售完為止。</p>
                <p>⚠️ 實際庫存以門市現場餘量為主。</p>
                <p>⚠️ <strong>未滿十八歲禁止飲酒</strong>，飲酒過量有礙健康。</p>
            </div>
            <button onclick="document.getElementById('info-modal').style.display='none'" 
                    class="w-full mt-6 bg-blue-900 text-white py-3 rounded-xl font-bold">我已了解，進入瀏覽</button>
        </div>
    </div>

    <div class="bg-blue-900 text-white p-6 text-center shadow-lg">
        <h1 class="text-3xl font-bold">🛒 台酒便利店-台東店</h1>
        <p class="text-xl opacity-80 mt-1">即期惜福商品 新增品項</p>
    </div>

    <div class="max-w-md mx-auto mt-4 px-4">
        <div class="bg-white border border-gray-200 p-5 rounded-xl shadow-sm text-base text-gray-700 space-y-2 leading-relaxed">
            <p>⚠️ 此網頁僅供布達此批新增的即期惜福商品 使用</p>
            <p>⚠️ 非即時庫存資訊，數量有限，售完為止</p>
            <p>⚠️ 實際庫存以門市現場餘量為主</p>
            <p class="font-bold text-blue-600 pt-1">更新日期時間: <span id="update-time">讀取中...</span></p>
        </div>
    </div>

    <div id="product-list" class="max-w-md mx-auto mt-6 px-4 space-y-6">
        <p class="text-center text-gray-500 py-10">資料讀取中...</p>
    </div>

    <div class="fixed bottom-0 left-0 w-full p-4 bg-white border-t border-gray-200 shadow-2xl z-50">
        <a href="https://line.me/ti/g2/N67vzPzpWCTlliROQX-xmG0uukqoXzNA_bbVsA?utm_source=invitation&utm_medium=link_copy&utm_campaign=default" 
           class="block w-full bg-green-600 text-white text-center py-4 rounded-xl font-bold text-xl shadow-md hover:bg-green-700 transition">
            💬 點擊諮詢
        </a>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQnV4EqBRopVryeZFVCCVelHDLrhthjiKbJ5EC88d0HjuZ5ub22wrbgPc6ELc0rrLUvkj3o5uqxNAC4/pub?gid=558116347&single=true&output=csv'; 

        fetch(csvUrl)
            .then(res => res.text())
            .then(data => {
                const lines = data.split(/\r?\n/).filter(l => l.trim() !== '');
                
                // 顯示更新時間
                document.getElementById('update-time').innerText = lines[0] ? lines[0].split(',')[0].replace(/"/g, '').trim() : "更新中";
                
                const container = document.getElementById('product-list');
                container.innerHTML = '';

                // 從第 2 行開始 (i=1)
                for (let i = 1; i < lines.length; i++) {
                    const row = lines[i];
                    
                    // 過濾標題行 (若包含這些關鍵字則跳過)
                    if (row.includes("名稱") || row.includes("原價") || row.includes("即期")) continue;

                    const cols = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || row.split(',');
                    
                    if (cols.length >= 3) {
                        const name = cols[0] ? cols[0].replace(/"/g, '') : "";
                        const originalPrice = cols[1] ? cols[1].replace(/"/g, '') : "0";
                        const salePrice = cols[2] ? cols[2].replace(/"/g, '') : "0";
                        const date = cols[3] ? cols[3].replace(/"/g, '') : "無期限";
                        const saving = cols[4] ? cols[4].replace(/"/g, '') : "0";
                        
                        if (name === "") continue;

                        container.innerHTML += `
                            <div class="bg-white rounded-3xl shadow-lg p-6 border border-gray-100">
                                <h2 class="text-2xl font-bold text-gray-900 mb-4">${name}</h2>
                                <div class="flex justify-between items-center bg-gray-50 p-3 rounded-lg mb-3">
                                    <span class="text-gray-500 font-medium">即期說明</span>
                                    <span class="text-gray-800 font-bold">${date}</span>
                                </div>
                                <div class="flex justify-between items-center">
                                    <span class="text-2xl font-black text-green-600">現省 $${saving}</span>
                                    <div class="text-right">
                                        <p class="text-sm text-gray-400 line-through">原價 $${originalPrice}</p>
                                        <p class="text-3xl font-black text-red-600">$${salePrice}元</p>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                }
            });
    </script>
</body>
</html>
